<!doctype html>

<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Athletic Editorial - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#d0e5fa",
              "on-secondary-container": "#fefcff",
              "on-primary-fixed-variant": "#36495a",
              "secondary-container": "#2170e4",
              "on-secondary-fixed-variant": "#004395",
              "on-error": "#ffffff",
              "primary-container": "#122636",
              "on-primary": "#ffffff",
              "error-container": "#ffdad6",
              "outline-variant": "#c3c7cc",
              tertiary: "#160e00",
              "surface-tint": "#4d6073",
              "on-tertiary-fixed": "#251a00",
              "secondary-fixed-dim": "#adc6ff",
              "on-tertiary-fixed-variant": "#5a4300",
              "on-surface": "#171c1f",
              "tertiary-fixed-dim": "#f7be1d",
              "surface-container-high": "#e4e9ed",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#302200",
              "surface-container-lowest": "#ffffff",
              primary: "#00101e",
              "on-secondary-fixed": "#001a42",
              "secondary-fixed": "#d8e2ff",
              "on-tertiary-container": "#af8500",
              "inverse-surface": "#2c3134",
              "on-surface-variant": "#43474c",
              "on-primary-fixed": "#081d2d",
              "on-secondary": "#ffffff",
              outline: "#74777d",
              "surface-bright": "#f6fafe",
              error: "#ba1a1a",
              "on-primary-container": "#7a8ea1",
              "tertiary-fixed": "#ffdf9a",
              "surface-container-highest": "#dfe3e7",
              "surface-dim": "#d6dade",
              "surface-container": "#eaeef2",
              "on-error-container": "#93000a",
              "inverse-primary": "#b5c9de",
              "inverse-on-surface": "#edf1f5",
              "primary-fixed-dim": "#b5c9de",
              "surface-container-low": "#f0f4f8",
              background: "#f6fafe",
              surface: "#f6fafe",
              secondary: "#0058be",
              "on-background": "#171c1f",
              "surface-variant": "#dfe3e7",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };

    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .editorial-gradient {
        background: linear-gradient(135deg, #00101e 0%, #122636 100%);
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background font-body text-on-background min-h-screen flex flex-col overflow-x-hidden"
  >
    <!-- Top App Bar (Shell Component) - Transactional Hidden State Logic Applied: Minimal Version -->
    <header
      class="flex items-center justify-between px-6 py-8 w-full sticky top-0 z-50"
    >
      <div class="flex items-center gap-2">
        <span
          class="text-xl font-extrabold tracking-tighter text-primary font-headline uppercase"
          >The Athletic</span
        >
      </div>
    </header>
    <main class="flex-1 flex flex-col px-6 pb-12">
      <!-- Hero Visual Section - Asymmetric Layout -->
      <div class="relative mb-12">
        <div
          class="w-full aspect-[4/5] rounded-xl overflow-hidden relative shadow-2xl"
        >
          <img
            class="w-full h-full object-cover"
            data-alt="cinematic close-up of a professional athlete tying shoelaces in a dimly lit high-end gym with dramatic technical blue lighting"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMTmNaXu-dYJJ0ak6Tu9HcdUfth5iXsSWIW-Nf_Fs9edKUNx7nceSb3HEvQVclEaNHRdZb4uGJ8JS2iD2__bvmZkg8xZWG0sEuEu54oQrlMLdWfYosj5qiin5sAX3CRGcW25SdUZdbB0brR3yS7XxM8HqNiO3el0kmIvdfOJxmLsUGenJD19NKUokMU-frbXu-MA7CwnAbsQwFHAl34n0zHhUbAnX6rQ27DZPevfmuh2P4mB9pODQddxRnd4ZatD_fk4WD2T-9D_Nm"
          />
          <div
            class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"
          ></div>
          <div class="absolute bottom-6 left-6 right-6">
            <h1
              class="font-headline font-extrabold text-4xl leading-none text-white tracking-tight mb-2"
            >
              Bienvenido a <br />
              Athletic Editorial
            </h1>
            <p class="text-white/70 font-body text-sm max-w-[240px]">
              The precision curator for high-performance sports and group
              coordination.
            </p>
          </div>
        </div>
        <!-- Floating Decorative Stat Card - Asymmetric Overlap -->
        <div
          class="absolute -bottom-6 -right-2 bg-surface-bright/80 backdrop-blur-xl p-4 rounded-xl shadow-[0_12px_40px_rgba(23,28,31,0.06)] border border-white/20 max-w-[140px]"
        >
          <div class="flex flex-col gap-1">
            <span
              class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant"
              >Active Now</span
            >
            <div class="flex items-center gap-2">
              <div class="w-2 h-2 rounded-full bg-secondary"></div>
              <span class="text-lg font-headline font-bold text-primary"
                >1,284</span
              >
            </div>
          </div>
        </div>
      </div>
      <!-- Authentication Section -->
      <div class="flex flex-col gap-4 mt-auto">
        <!-- Google OAuth -->
        <button
          class="w-full h-14 bg-surface-container-lowest rounded-xl flex items-center justify-center gap-3 transition-all active:scale-95 duration-150 group"
        >
          <svg
            fill="none"
            height="20"
            viewbox="0 0 20 20"
            width="20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M19.6001 10.2273C19.6001 9.51819 19.5365 8.83637 19.4183 8.18182H10.0001V12.05h5.3818C15.1501 13.3 14.441 14.3591 13.3819 15.0682V17.5864H16.6228C18.5183 15.8409 19.6001 13.2773 19.6001 10.2273Z"
              fill="#4285F4"
            ></path>
            <path
              d="M10 20C12.7 20 14.9636 19.1045 16.6227 17.5864L13.3818 15.0682C12.4818 15.6727 11.3409 16.0318 10 16.0318C7.39545 16.0318 5.19091 14.2727 4.40455 11.9045H1.05908V14.4955C2.70455 17.7636 6.08636 20 10 20Z"
              fill="#34A853"
            ></path>
            <path
              d="M4.40455 11.9045C4.20455 11.3045 4.09091 10.6636 4.09091 10C4.09091 9.33636 4.20455 8.69545 4.40455 8.09545V5.50455H1.05908C0.381818 6.85909 0 8.38636 0 10C0 11.6136 0.381818 13.1409 1.05908 14.4955L4.40455 11.9045Z"
              fill="#FBBC05"
            ></path>
            <path
              d="M10 3.96818C11.4682 3.96818 12.7864 4.47273 13.8227 5.46364L16.6955 2.59091C14.9591 0.986364 12.6955 0 10 0C6.08636 0 2.70455 2.23636 1.05908 5.50455L4.40455 8.09545C5.19091 5.72727 7.39545 3.96818 10 3.96818Z"
              fill="#EA4335"
            ></path>
          </svg>
          <span class="font-label font-semibold text-primary"
            >Continue with Google</span
          >
        </button>
        <!-- Apple OAuth -->
        <button
          class="w-full h-14 bg-primary text-on-primary rounded-xl flex items-center justify-center gap-3 transition-all active:scale-95 duration-150"
        >
          <svg
            fill="none"
            height="21"
            viewbox="0 0 18 21"
            width="18"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M15.1166 10.6559C15.1054 8.23232 17.0734 7.07018 17.1706 7.01423C16.0355 5.35626 14.2731 5.12131 13.6571 5.09331C12.1895 4.94503 10.7937 5.96205 10.0461 5.96205C9.29853 5.96205 8.13639 5.12131 6.9015 5.14371C5.26786 5.16891 3.75133 6.09647 2.91168 7.55476C1.21665 10.5055 2.47614 14.8698 4.12489 17.2526C4.93126 18.4194 5.88569 19.728 7.13943 19.6804C8.34444 19.63 8.80068 18.8995 10.2581 18.8995C11.7155 18.8995 12.1352 19.6804 13.3986 19.6552C14.7067 19.63 15.541 18.467 16.3401 17.2974C17.2644 15.945 17.6475 14.6401 17.667 14.5674C17.6391 14.5562 14.821 13.4731 15.1166 10.6559ZM12.3831 3.42417C13.0409 2.63004 13.4832 1.52737 13.3601 0.421875C12.414 0.461051 11.2674 1.05445 10.5898 1.84858C9.98246 2.54823 9.45063 3.66736 9.59336 4.74763C10.654 4.8288 11.7253 4.21831 12.3831 3.42417Z"
              fill="white"
            ></path>
          </svg>
          <span class="font-label font-semibold">Continue with Apple</span>
        </button>
        <!-- Or divider using white space/tonal shift as per No-Line rule -->
        <div class="flex items-center gap-4 py-4">
          <div class="flex-1 h-[1px] bg-surface-container-highest/30"></div>
          <span
            class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant/50"
            >or email</span
          >
          <div class="flex-1 h-[1px] bg-surface-container-highest/30"></div>
        </div>
        <!-- Email Input -->
        <div class="relative">
          <input
            class="w-full h-14 bg-surface-container-high border-none rounded-xl px-6 focus:ring-2 focus:ring-secondary/50 font-body text-sm transition-all placeholder:text-on-surface-variant/40"
            placeholder="Email Address"
            type="email"
          />
        </div>
        <button
          class="w-full h-14 editorial-gradient text-on-primary rounded-xl font-headline font-bold text-base tracking-tight shadow-lg shadow-primary/20 active:scale-95 duration-150"
        >
          Sign in with Email
        </button>
      </div>
      <!-- Footer Links -->
      <div class="mt-12 flex flex-col items-center gap-6">
        <a class="group flex items-center gap-2" href="#">
          <span
            class="text-xs font-bold font-label text-on-surface-variant/60 uppercase tracking-widest transition-colors group-hover:text-primary"
            >Start your group</span
          >
          <span
            class="material-symbols-outlined text-secondary text-lg"
            data-icon="arrow_forward"
            >arrow_forward</span
          >
        </a>
        <p
          class="text-[11px] text-on-surface-variant/40 text-center leading-relaxed"
        >
          By signing in, you agree to our <br />
          <a
            class="underline underline-offset-4 decoration-outline-variant/30 hover:text-on-surface-variant transition-colors"
            href="#"
            >Terms of Service</a
          >
          and
          <a
            class="underline underline-offset-4 decoration-outline-variant/30 hover:text-on-surface-variant transition-colors"
            href="#"
            >Privacy Policy</a
          >.
        </p>
      </div>
    </main>
    <!-- Navigation Shell - Suppressed for Transactional/Login Screens per "Shell Visibility & Relevance" mandate -->
  </body>
</html>
